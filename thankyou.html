<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting Aura Studio. Your message has been sent successfully.">
    <title>Thank You — Aura Studio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Inline script to apply theme immediately before render -->
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
</head>
<body>
    <!-- Glow Cursor Tracker Background -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- Background Orbs -->
    <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navigation Header -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-glow"></span>
                <span class="logo-text">AURA</span>
            </a>
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html#hero" class="nav-link">Home</a>
                <a href="index.html#about" class="nav-link">About</a>
                <a href="index.html#works" class="nav-link">Works</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </nav>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Success Message Section -->
    <main class="success-page-container">
        <div class="success-card">
            <div class="success-icon-wrapper">
                <div class="success-icon-glow"></div>
                <i class="fa-solid fa-circle-check success-icon"></i>
            </div>
            <h1 class="success-title">Message <span class="gradient-text">Sent!</span></h1>
            <p class="success-message">
                Thank you for reaching out! Your submission has been received successfully. I will get back to you as soon as possible.
            </p>
            <div class="success-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Portfolio</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 Aura Studio. All rights reserved.</p>
            <p>Designed and coded with <i class="fa-solid fa-heart footer-heart"></i></p>
        </div>
    </footer>

    <!-- Interactive script specific to Thank You page -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Theme Toggle Logic
            const themeToggleBtn = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;
            
            function updateThemeIcon(theme) {
                const icon = themeToggleBtn.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'fa-solid fa-sun';
                } else {
                    icon.className = 'fa-solid fa-moon';
                }
            }

            // Sync icon on load
            const currentTheme = htmlElement.getAttribute('data-theme');
            updateThemeIcon(currentTheme);

            themeToggleBtn.addEventListener('click', () => {
                const activeTheme = htmlElement.getAttribute('data-theme');
                const newTheme = activeTheme === 'dark' ? 'light' : 'dark';
                
                htmlElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
                
                themeToggleBtn.style.transform = 'scale(0.85) rotate(45deg)';
                setTimeout(() => {
                    themeToggleBtn.style.transform = '';
                }, 150);
            });

            // Cursor glow tracking
            const cursorGlow = document.getElementById('cursor-glow');
            document.addEventListener('mousemove', (e) => {
                requestAnimationFrame(() => {
                    cursorGlow.style.left = `${e.clientX}px`;
                    cursorGlow.style.top = `${e.clientY}px`;
                });
            });
        });
    </script>
</body>
</html>
